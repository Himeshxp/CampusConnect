spring.config.import=optional:file:.env
spring.application.name=cc
spring.datasource.url=jdbc:postgresql://localhost:5432/ccdb
spring.datasource.username=postgres
spring.datasource.password=iamhim


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Session cookie configuration for cross-origin support in development
# Note: SameSite=None requires Secure, which requires HTTPS
# For HTTP development, we'll handle this in the CORS filter
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
# SameSite will be handled by the filter for cross-origin support


