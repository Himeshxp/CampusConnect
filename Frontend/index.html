<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Connect Portal</title>
  <meta name="description" content="Campus Connect Portal - Your one-stop portal for campus services">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons+Round">

<body>
  <div id="app"></div>

  <!-- Templates -->
  <template id="template-landing">
    <div class="landing-page">
      <button class="theme-toggle theme-toggle-left" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">
        <span class="material-icons-round">light_mode</span>
      </button>
      <header class="landing-header">
        <div class="landing-logo">
          <div class="logo-img">
            <img src="images/Campus.png" alt="Logo Image" width="100" height="auto">
          </div>
          <span class="logo-text">Campus Connect Portal</span>
        </div>
      </header>
      
      <main class="landing-hero">
        <div class="hero-content">
          <h1 class="hero-title">
            Welcome to<br>
            <span class="hero-highlight">Campus Connect</span>
          </h1>
          <p class="hero-description">
            Your one-stop portal for managing campus complaints, registering for events, and staying connected with your institution.
          </p>
          <div class="role-selection">
            <div class="role-card role-card-student" onclick="navigate('student-login')">
              <div class="role-icon"><span class="material-icons-round">school</span></div>
              <div class="role-content">
                <h3>Login as Student</h3>
                <p>Access your dashboard, submit complaints, and register for events</p>
              </div>
              <span class="role-arrow"><span class="material-icons-round">arrow_forward</span></span>
            </div>
            <div class="role-card role-card-staff" onclick="navigate('staff-login')">
              <div class="role-icon"><span class="material-icons-round">badge</span></div>
              <div class="role-content">
                <h3>Login as Staff</h3>
                <p>Manage complaints, create events, and view analytics</p>
              </div>
              <span class="role-arrow"><span class="material-icons-round">arrow_forward</span></span>
            </div>
          </div>
        </div>
        <div class="hero-decoration">
          <div class="decoration-circle decoration-1"></div>
          <div class="decoration-circle decoration-2"></div>
          <div class="decoration-circle decoration-3"></div>
        </div>
      </main>
      
      <footer class="landing-footer">
        <p>&copy; 2026 Campus Connect Portal. All rights reserved.</p>
      </footer>
    </div>
  </template>

  <!-- !: Student Login Form -->
  <template id="template-student-login">
    <div class="login-page">
      <button class="theme-toggle theme-toggle-left" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">
        <span class="material-icons-round">light_mode</span>
      </button>
      <div class="login-container w-100">
        <a href="#" class="login-back" onclick="navigate('landing'); return false;">
          <span class="material-icons-round">arrow_back</span> Back to Home
        </a>
        <div class="login-card">
          <div class="login-header">
            <div class="login-icon login-icon-student"><span class="material-icons-round">school</span></div>
            <h1>Student Login</h1>
            <p>Sign in to access your student portal</p>
          </div>
          <form class="login-form" onsubmit="handleStudentLogin(event)">
            <div class="form-group">
              <label for="email">Email</label>
              <div class="input-icon-wrapper">
                <span class="input-icon"><span class="material-icons-round">mail</span></span>
                <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
              </div>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-icon-wrapper">
                <span class="input-icon"><span class="material-icons-round">lock</span></span>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                <span class="eye-icon" onclick="toggleVisibility(this)"><span class="material-icons-round">visibility</span></span>
              </div>
            </div>
            <button type="submit" class="btn btn-student w-100 login-btn">Login</button>
          </form>
        </div>
      </div>
    </div>
  </template>

  <!-- !: Staff Login Form -->
  <template id="template-staff-login">
    <div class="login-page login-page-staff">
      <button class="theme-toggle theme-toggle-left" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">
        <span class="material-icons-round">light_mode</span>
      </button>
      <div class="login-container w-100">
        <a href="#" class="login-back" onclick="navigate('landing'); return false;">
          <span class="material-icons-round">arrow_back</span> Back to Home
        </a>
        <div class="login-card">
          <div class="login-header">
            <div class="login-icon login-icon-staff"><span class="material-icons-round">badge</span></div>
            <h1>Staff Login</h1>
            <p>Sign in to access staff management portal</p>
          </div>
          <form class="login-form" onsubmit="handleStaffLogin(event)">
            <div class="form-group">
              <label for="email">Email</label>
              <div class="input-icon-wrapper">
                <span class="input-icon"><span class="material-icons-round">mail</span></span>
                <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
              </div>
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-icon-wrapper">
                <span class="input-icon"><span class="material-icons-round">lock</span></span>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                <span class="eye-icon" onclick="toggleVisibility(this)"><span class="material-icons-round">visibility</span></span>
              </div>
            </div>
            <button type="submit" class="btn btn-staff w-100 login-btn">Login</button>

  <template id="template-navbar">
    <nav class="navbar">
      <div class="navbar-container">
        <a href="#" class="navbar-brand" data-nav-brand>
          <div class="navbar-logo logo-img">
            <img src="Campus.png" alt="Logo" width="100" height="auto">
          </div>
          <span class="navbar-title">Campus Connect</span>
        </a>  
        <div class="navbar-links" data-nav-links></div>
        <div class="navbar-actions">
          <span class="navbar-user" data-nav-user></span>
          <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">

          </button>
          <button class="navbar-logout" onclick="handleLogout()">

          </button>
        </div>
        <button class="navbar-mobile-toggle" onclick="toggleMobileNav()">

        </button>
      </div>

  <template id="template-student-dashboard">
    <div class="dashboard-layout">
      <div data-navbar-placeholder></div>
      <main class="dashboard-main">

        <div class="dashboard-container">
          <div class="dashboard-content">
            <div class="dashboard-header">

              <p>Here's an overview of your campus activities</p>

                  <div class="action-content">

                  </div>
                  <span class="action-arrow"><span class="material-icons-round">chevron_right</span></span>

  <template id="template-student-complaints">
    <div class="dashboard-layout">
      <div data-navbar-placeholder></div>
      <main class="dashboard-main">
        <div class="dashboard-container">
          <div class="page-content">
            <div class="page-header">
              <div>
                <h1>My Complaints</h1>
                <p>Submit and track your complaints</p>
              </div>
              <button class="btn btn-primary" onclick="openComplaintModal()">
                <span class="material-icons-round">add</span> New Complaint
              </button>
            </div>
            
            <div class="filters-section">
              <div class="filter-group">
                <label>Category:</label>
                <select class="filter-select" id="category-filter" onchange="filterComplaints()">
                  <option value="all">All Categories</option>
                  <option value="Facilities">Facilities</option>
                  <option value="IT">IT</option>
                  <option value="Food">Food</option>
                  <option value="Academic">Academic</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="filter-group">
                <label>Status:</label>
                <select class="filter-select" id="status-filter" onchange="filterComplaints()">
                  <option value="all">All Status</option>
                  <option value="Pending">Pending</option>
                  <option value="In-progress">In-progress</option>
                  <option value="Resolved">Resolved</option>
                </select>
              </div>
            </div>
            
            <div class="table-container">
              <table class="data-table w-100">
                <thead>
                  <tr>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Actions</th>
                  </tr>
                </thead>

              </table>
            </div>
          </div>
        </div>
      </main>
    </div>
    <div id="complaint-modal" class="modal-overlay hidden" onclick="closeModal(event, 'complaint-modal')">
      <div class="modal-content w-100" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2>Submit New Complaint</h2>
          <p>Describe your issue in detail</p>
        </div>
        <form class="modal-body" onsubmit="handleSubmitComplaint(event)">
          <div class="modal-form">
            <div class="form-group">
              <label for="complaint-title">Title</label>
              <input type="text" id="complaint-title" placeholder="Brief description of the issue" required>
            </div>
            <div class="form-group">
              <label for="complaint-category">Category</label>
              <select id="complaint-category" required>
                <option value="">Select category</option>
                <option value="Facilities">Facilities</option>
                <option value="IT">IT</option>
                <option value="Food">Food</option>
                <option value="Academic">Academic</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="complaint-description">Description</label>
              <textarea id="complaint-description" rows="4" placeholder="Provide detailed information about your complaint" required></textarea>
            </div>
            <div class="form-group">
              <label for="complaint-file">Attachment (Optional)</label>
              <input type="file" id="complaint-file" accept="image/*">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline" onclick="closeComplaintModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Submit Complaint</button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <template id="template-student-events">
    <div class="dashboard-layout">
      <div data-navbar-placeholder></div>
      <main class="dashboard-main">
        <div class="dashboard-container">

                  </div>
                  <div>
                    <label style="font-weight:600;">Your Details:</label>
                    <div id="register-student-info"></div>
                  </div>
                  <div class="modal-footer" style="margin-top:1rem;">
                    <button type="button" class="btn btn-outline" onclick="closeRegisterModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Confirm Registration</button>
                  </div>

            </div>

  <!-- Configure backend API base URL here (no trailing slash). -->
  <!-- Example for local dev: http://localhost:8080 -->
  <script>
    // Auto-redirect from 127.0.0.1 to localhost to ensure session cookies work
    // Browsers treat localhost and 127.0.0.1 as different origins, which causes
    // SameSite=Lax cookies to not be sent with POST/DELETE requests
    if (window.location.hostname === '127.0.0.1') {
      const localhostUrl = window.location.href.replace('127.0.0.1', 'localhost');
      window.location.replace(localhostUrl);
    }
    window.CAMPUSCONNECT_API_BASE = "http://localhost:8080";
  </script>

  <!-- Rating Modal (top-level so both students and staff can open it) -->
  <div id="rating-modal" class="modal-overlay hidden" onclick="closeModal(event, 'rating-modal')">
    <div class="modal-content w-100" onclick="event.stopPropagation()" style="max-width:640px;">
      <div class="modal-header">
        <h2>Rate this complaint</h2>
        <p style="color:var(--muted-foreground); margin-top:0.25rem;">Only available for resolved complaints</p>
      </div>
      <form id="rating-form" class="modal-body" onsubmit="handleSubmitRating(event)">
        <div style="display:flex;flex-direction:column;gap:1rem;">
          <div>
            <label style="font-weight:600; display:block; margin-bottom:0.5rem;">Your rating</label>
            <div id="rating-stars" style="font-size:1.5rem;"> 
              <!-- stars injected by JS -->
            </div>
          </div>

          <div>
            <label style="font-weight:600; display:block; margin-bottom:0.5rem;">Quick tags</label>
            <div id="rating-tags" style="display:flex;gap:0.5rem;flex-wrap:wrap;">
              <button type="button" class="tag-btn" data-tag="Slow response">⏱️ Slow response</button>
              <button type="button" class="tag-btn" data-tag="Polite staff">😊 Polite staff</button>
              <button type="button" class="tag-btn" data-tag="Problem fixed">🔧 Problem fixed</button>
              <button type="button" class="tag-btn" data-tag="Not satisfied">❌ Not satisfied</button>
            </div>
          </div>

          <div>
            <label style="font-weight:600; display:block; margin-bottom:0.5rem;">Additional comments (optional)</label>
            <textarea id="rating-comment" rows="4" placeholder="Any additional feedback..." style="width:100%;"></textarea>
          </div>

          <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.5rem;">
            <button type="button" class="btn btn-outline" onclick="closeRatingModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Submit Rating</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
